name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

# Required for GitHub Pages with "GitHub Actions" source
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build React app
      - name: Build React app
        env:
          REACT_APP_GITHUB_TOKEN: ${{ secrets.REACT_APP_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          USE_GITHUB_DATA: ${{ secrets.USE_GITHUB_DATA }}
          REACT_APP_ADMIN_PASSWORD: ${{ secrets.REACT_APP_ADMIN_PASSWORD }}
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      # 5. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. Upload build output as Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

      # 7. Deploy — the live URL is printed in the Actions summary automatically
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
