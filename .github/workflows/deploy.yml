name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (match local version)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build (skip GitHub data fetch unless token is provided)
      - name: Build React app
        env:
          # Optional: add these secrets in GitHub → Settings → Secrets → Actions
          REACT_APP_GITHUB_TOKEN: ${{ secrets.REACT_APP_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          USE_GITHUB_DATA: ${{ secrets.USE_GITHUB_DATA }}
          REACT_APP_ADMIN_PASSWORD: ${{ secrets.REACT_APP_ADMIN_PASSWORD }}
          # Suppress CI=true strict mode so warnings don't fail the build
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      # 5. Deploy the build/ folder to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          # Keep CNAME file if you have a custom domain configured
          # cname: yourdomain.com
